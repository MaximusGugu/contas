<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3C5558">
  <title>Contas Mensais - Offline</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #F8EED7;
      --panel: #3C5558;
      --text: #FFF8E8;
      --muted: rgba(255, 248, 232, 0.75);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(60, 85, 88, 0.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(60, 85, 88, 0.09) 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text);
      font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(420px, 100%);
      padding: 30px;
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 16px 48px rgba(22, 32, 33, 0.18);
      text-align: center;
    }

    img {
      display: block;
      width: min(210px, 65%);
      max-height: 120px;
      object-fit: contain;
      margin: 0 auto 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/icons/icon-192.png" alt="">
    <h1>Sem conexão</h1>
    <p>O app já está preparado para abrir offline depois que os assets forem carregados. Reconecte para sincronizar seus dados.</p>
  </main>
</body>
</html>
